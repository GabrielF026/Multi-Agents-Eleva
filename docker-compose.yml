services:
  app:
    build: .
    container_name: multi_agents_app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/multi_agents
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-30.0}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID:-}
      COMPANY_WHATSAPP_NUMBER: ${COMPANY_WHATSAPP_NUMBER:-5511999999999}
      PYTHONPATH: /app
    restart: always

  db:
    image: postgres:15
    container_name: multi_agents_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multi_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
